<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container-fluid">
    <div class="row vh-100">
      <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
        <h4 class="text-white mb-4">UMG Asistencia</h4>
      </nav>
      <main class="col-md-9 col-lg-10 d-flex justify-content-center align-items-center">
        <div class="card p-4" style="width: 450px;">
          <h4 class="mb-2 text-center" >Crear Usuario
            <input id="email" class="form-control mb-2" placeholder="correo">
            <input id="password" type="password" class="form-control mb-3" placeholder="contraseña">
            <input id="primerNombre" class="form-control mb-2" placeholder="primer nombre">
            <input id="segundoNombre" class="form-control mb-2" placeholder="segundo nombre">
            <input id="masNombres" class="form-control mb-2" placeholder="mas nombres">
            <input id="primerApellido" class="form-control mb-2" placeholder="primer apellido">
            <input id="segundoApellido" class="form-control mb-2" placeholder="segundo apellido">
            <div class="d-flex gap-2 mb-3">
              <label class="form-control w-50 text-center">
                <input id='estudiante' type="radio" name="tipoUsuario" value="ESTUDIANTE" class="me-2">Estudiante
              </label>
              <label class="form-control w-50 text-center">
                <input id='catedratico' type="radio" name="tipoUsuario" value="CATEDRATICO" class="me-2">Catedrático
              </label>
            </div>
            <div id="errorRol" class="text-danger small text-center mt-0 d-none"> Elija un rol </div>
          <input id="carnet" class="form-control mb-2" placeholder="carnet">
          <button id="confirmar" class="btn btn-primary w-100">Confirmar</button>
          <a id="inicioSesion" class="btn btn-primary w-100 btn-login" href="./login.html">Inicio de Sesión</a>
          </h4>
        </div>
      </main>    
  </div>
  <script type="module" src="../js/signIn.js"></script>
</body>
</html>
