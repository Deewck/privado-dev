<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Usuario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <div class="card p-4" style="width: 300px;">
    <h4 class="mb-3">Crear Usuario</h4>

    <input id="email" class="form-control mb-2" placeholder="correo">
    <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">
    <input id="primerNombre" class="form-control mb-2" placeholder="primer nombre">
    <input id="segundoNombre" class="form-control mb-2" placeholder="segundo nombre">
    <input id="masNombres" class="form-control mb-2" placeholder="primer nombre">
    <input id="primerApellido" class="form-control mb-2" placeholder="primer apellido">
    <input id="segundoApellido" class="form-control mb-2" placeholder="segundo apellido">
    
    <button class="btn btn-primary w-100" onclick="login()">Confirmar</button>
  </div>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
