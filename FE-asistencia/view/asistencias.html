<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Asistencia UMG</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style> </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
      <h4 class="text-white mb-4">UMG Asistencia</h4>
      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a class="nav-link active" href="./index.html">
            <i class="bi bi-house-door me-2"></i>
            Inicio
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/ia.html">
            🤖 IA Asistencia
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="./misCursos.html">
            <i class="bi bi-book me-2"></i>
            Mis Cursos
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="./creaSesion.html">
            <i class="bi bi-qr-code me-2"></i>
            Crear Sesión
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="./asistencias.html">
            <i class="bi bi-check2-square me-2"></i>
            Asistencias
          </a>
        </li>
        <li class="nav-item mb-2">
          <a class="nav-link" href="./consultas.html">
            <i class="bi bi-bar-chart me-2"></i>
            Consultas
          </a>
        </li>
      </ul>
      <hr class="text-secondary">
      <ul class="nav flex-column">
        <li class="nav-item">
          <a id="logOut" class="nav-link text-danger" href="#">
            <i class="bi bi-box-arrow-right me-2"></i>
            Cerrar sesión
          </a>
        </li>
      </ul>
    </nav>
    <main class="col-md-9 ms-sm-auto col-lg-10 content">
      <h2>Asistencias</h2>
      <div class="card">
        <div class="card-body">
          <h5 class="card-title">Cursos</h5>
          <ul id="listaMisCursos" class="list-group"></ul>
        </div>
      </div>
      <div class="card mt-3">
        <div class="card-body text-center">
          <h5 class="card-title">Escanear QR</h5>
          <button id="btnScan" class="btn btn-success mb-3">
            Iniciar escaneo
          </button>
          <div id="reader" style="width:300px; margin:auto;"></div>
        </div>
      </div>
      <div id="asistenciaOK" class="modal-qr d-none">
        <div class="modal-content-qr">
          <span id="cerrarQR" class="cerrar">&times;</span>
          <h4>Asistencia registrada</h4>
          <p>Tu asistencia se registró correctamente.</p>
          <button id="btnCerrar" class="btn btn-primary mt-2">Aceptar</button>
        </div>
      </div>
    </main>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script type="module" src="../js/asistencias.js"></script>
  </div>
</div>
</body>
</html>
