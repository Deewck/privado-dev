<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IA Asistencia UMG</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
      <h4 class="text-white mb-4">UMG Asistencia</h4>

      <ul class="nav flex-column">
        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/index.html">
            <i class="bi bi-house-door me-2"></i>
            Inicio
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/misCursos.html">
            <i class="bi bi-book me-2"></i>
            Mis Cursos
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/creaSesion.html">
            <i class="bi bi-qr-code me-2"></i>
            Crear Sesión
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/asistencias.html">
            <i class="bi bi-check2-square me-2"></i>
            Asistencias
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link" href="/view/consultas.html">
            <i class="bi bi-bar-chart me-2"></i>
            Consultas
          </a>
        </li>

        <li class="nav-item mb-2">
          <a class="nav-link active" href="/view/ia.html">
            <i class="bi bi-cpu me-2"></i>
            IA Asistencia
          </a>
        </li>
      </ul>

      <hr class="text-secondary">

      <ul class="nav flex-column">
        <li class="nav-item">
          <a id="logout" class="nav-link text-danger" href="#">
            <i class="bi bi-box-arrow-right me-2"></i>
            Cerrar sesión
          </a>
        </li>
      </ul>
    </nav>

    <main class="col-md-9 ms-sm-auto col-lg-10 content">
      <h2>Análisis Inteligente de Asistencia</h2>
      <p class="text-muted">
        Este módulo permite analizar el porcentaje de asistencia de un estudiante y generar una recomendación automática.
      </p>

      <div class="card mb-4">
        <div class="card-body">
          <h5 class="card-title mb-3">
            <i class="bi bi-cpu me-2"></i>
            Datos del estudiante
          </h5>

          <div class="row mb-3">
            <div class="col-md-4">
              <label class="form-label">Nombre del estudiante</label>
              <input id="nombre" class="form-control" placeholder="Ej. Juan Pérez">
            </div>

            <div class="col-md-4">
              <label class="form-label">Total de clases</label>
              <input id="totalClases" type="number" class="form-control" placeholder="Ej. 20">
            </div>

            <div class="col-md-4">
              <label class="form-label">Asistencias</label>
              <input id="asistencias" type="number" class="form-control" placeholder="Ej. 15">
            </div>
          </div>

          <button id="btnAnalizar" class="btn btn-primary">
            <i class="bi bi-search me-2"></i>
            Analizar asistencia
          </button>
        </div>
      </div>

      <div id="resultado" class="alert alert-info d-none"></div>
    </main>

    <script type="module" src="../js/ia.js"></script>
  </div>
</div>
</body>
</html>
