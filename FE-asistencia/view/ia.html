<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Análisis IA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container mt-5">
    <div class="card p-4">
      <h3 class="mb-3">Análisis Inteligente de Asistencia</h3>

      <input id="nombre" class="form-control mb-2" placeholder="Nombre del estudiante">
      <input id="totalClases" type="number" class="form-control mb-2" placeholder="Total de clases">
      <input id="asistencias" type="number" class="form-control mb-3" placeholder="Asistencias">

      <button id="btnAnalizar" class="btn btn-primary">Analizar asistencia</button>

      <div id="resultado" class="alert alert-info mt-4 d-none"></div>
    </div>
  </div>

  <script type="module" src="../js/ia.js"></script>
</body>
</html>
